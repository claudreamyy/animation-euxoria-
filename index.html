<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euxoria - Animation au Scroll</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Bienvenue sur Euxoria</h1>
        <p>Faites défiler pour découvrir l'animation</p>
    </header>

    <!-- Ce conteneur sert de "piste de défilement" pour l'animation -->
    <div class="scroll-container">
        <canvas id="hero-canvas"></canvas>
    </div>

    <main class="content-after">
        <h2>Le reste de votre page</h2>
        <p>Vous pouvez ajouter ici tout le contenu que vous souhaitez afficher après l'animation.</p>
        <p>...</p>
    </main>

    <script src="script.js"></script>
</body>
</html>
